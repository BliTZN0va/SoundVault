name: Build and Release

on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller SoundVault.spec

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoundVault-${{ github.ref_name }}
          path: dist/SoundVault.exe

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: SoundVault-${{ github.ref_name }}
          path: dist/

      - name: Generate release notes
        id: notes
        run: |
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
          echo "## SoundVault ${{ github.ref_name }}" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "See the [commit history](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for changes in this release." >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SoundVault ${{ github.ref_name }}
          body: ${{ env.RELEASE_NOTES }}
          files: dist/SoundVault.exe
          draft: false
          prerelease: false
